name: Build playlists

on:
  schedule:
    # 01:00 Asia/Singapore daily (17:00 UTC)
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: playlist-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Build bilingual playlists
        run: python scripts/build_playlists.py
      - name: Validate outputs
        run: python scripts/validate_repo.py
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          if git diff --cached --quiet; then
            echo "No playlist changes."
          else
            git commit -m "build: refresh bilingual playlists"
            git push
          fi
