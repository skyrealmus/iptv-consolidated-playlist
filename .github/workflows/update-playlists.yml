name: Build playlists

on:
  schedule:
    # 01:17 Asia/Singapore daily (17:17 UTC); off-minute reduces schedule contention.
    - cron: "17 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-generated-files
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Refresh selected public source mappings
        run: python scripts/refresh_sources.py
      - name: Build language-specific playlist
        run: python scripts/build_playlists.py
      - name: Validate outputs
        run: python scripts/validate_repo.py
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel.md manifest.json playlist.m3u reports/daily-refresh.json reports/stream-speed.json
          if git diff --cached --quiet; then
            echo "No playlist changes."
          else
            git commit -m "build: refresh language-specific playlist"
            git push
          fi
