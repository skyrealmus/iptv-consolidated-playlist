name: Logo assets

on:
  schedule:
    # 08:00 Asia/Singapore every Friday (00:00 UTC)
    - cron: "0 0 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  logos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Sync missing logo assets
        run: python scripts/sync_logos.py
      - name: Rebuild and validate
        run: |
          python scripts/build_playlists.py
          python scripts/validate_repo.py
      - name: Commit logo changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logo playlist.m3u
          if git diff --cached --quiet; then
            echo "No logo changes."
          else
            git commit -m "assets: refresh channel logos"
            git push
          fi
