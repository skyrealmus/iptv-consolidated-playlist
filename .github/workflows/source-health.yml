name: Source health

on:
  schedule:
    # 00:00 Asia/Singapore every Friday (16:00 UTC Thursday)
    - cron: "0 16 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Check public source inputs
        run: python scripts/check_sources.py
      - name: Commit health report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/source-health.json
          if git diff --cached --quiet; then
            echo "No source health changes."
          else
            git commit -m "ci: update source health report"
            git push
          fi
