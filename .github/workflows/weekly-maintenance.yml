name: Weekly maintenance

on:
  schedule:
    # 08:00 Asia/Singapore every Friday (00:00 UTC)
    - cron: "0 0 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-generated-files
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Check source health
        run: python scripts/check_sources.py
      - name: Sync missing logos
        run: python scripts/sync_logos.py
      - name: Rebuild and validate
        run: |
          python scripts/build_playlists.py
          python scripts/validate_repo.py
      - name: Commit maintenance changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logo playlist.m3u reports/source-health.json reports/source-quality.json
          if git diff --cached --quiet; then
            echo "No maintenance changes."
          else
            git commit -m "ci: update weekly maintenance outputs"
            git push
          fi
