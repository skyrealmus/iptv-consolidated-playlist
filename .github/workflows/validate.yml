name: Validate playlists

on:
  push:
    paths:
      - "manifest.json"
      - "assets/channel_metadata.json"
      - "assets/channel_aliases.txt"
      - "logo/**"
      - "scripts/**"
  pull_request:
    paths:
      - "manifest.json"
      - "assets/channel_metadata.json"
      - "assets/channel_aliases.txt"
      - "logo/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Generated-playlist commits are validated by their generating workflow.
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.13"
      - name: Check generated outputs
        run: python scripts/build_playlists.py --check
      - name: Validate repository
        run: python scripts/validate_repo.py
